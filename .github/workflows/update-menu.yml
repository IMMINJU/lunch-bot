name: Update Weekly Menu

on:
  # 스케줄은 외부 스케줄러(cron-job.org)가 workflow_dispatch로 정시 트리거함.
  # GitHub schedule 크론은 지연/스킵이 심해 제거했다. (월요일 10:00 KST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt selenium webdriver-manager

      - name: Run update_menu.py
        env:
          TZ: Asia/Seoul
        run: python update_menu.py

      - name: Commit and push menu_info.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add menu_info.json
          git diff --cached --quiet || git commit -m "Update menu_info.json ($(date +%Y-%m-%d))"
          git push
