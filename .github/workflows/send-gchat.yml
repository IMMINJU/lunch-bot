name: Send Lunch Menu to Google Chat

on:
  # 스케줄은 외부 스케줄러(cron-job.org)가 workflow_dispatch로 정시 트리거함.
  # GitHub schedule 크론은 지연/스킵이 심해 제거했다. (평일 11:00 KST)
  workflow_dispatch: # 외부 스케줄러 + 수동 트리거

jobs:
  send-menu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send lunch menu to Google Chat
        env:
          GCHAT_WEBHOOK_URL: ${{ secrets.GCHAT_WEBHOOK_URL }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          TZ: Asia/Seoul
        run: python send_gchat.py
